<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">

    <title>Instagram Clone - Home</title>
</head>

<body>

    <div class="box">


        <header class="header">

            <div class="logo">
                <img src="instagram_logotype.png" alt="Instagram Logo" height="80">
            </div>

            <div class="header-icons">
                <i class="bi bi-heart"></i>
                <i class="bi bi-send"></i>
            </div>

        </header>

        <!-- Stories -->
        <section class="story-field">

            <div class="story">
                <div class="story-ring">
                    <div class="story-image"></div>
                </div>
                <p>Your Story</p>
            </div>

            <div class="story">
                <div class="story-ring">
                    <div class="story-image"></div>
                </div>

                <p>user_1</p>
            </div>

            <div class="story">
                <div class="story-ring">
                    <div class="story-image"></div>
                </div>
                
                <p>user_2</p>
            </div>

            <div class="story">
                <div class="story-ring">
                    <div class="story-image"></div>
                </div>
                
                <p>user_3</p>
            </div>

            <div class="story">
                <div class="story-ring">
                    <div class="story-image"></div>
                </div>
                
                <p>user_4</p>
            </div>

        </section>

        <!-- Feed -->
        <section class="feed">

            <!-- <article class="post"> -->

            <!-- Post Header -->
            <div class="post-header">

            </div>
            <div class="header2">
                <div class="story">
                    <div class="story-image1"></div>
                </div>
                <div class="user">username</div>
                <!-- <i class="fa-solid fa-ellipsis-vertical"></i> -->
                <div class="follow">Follow</div>
                <div class="menu">&#8942;</div>
            </div>
            <!-- Post Image -->
            <div class="post-image">

            </div>

            <!-- Post Actions -->
            <div class="post-actions">
                <div class="left-actions">
                    <i class="bi bi-heart"></i>
                    <i class="bi bi-chat"></i>
                    <i class="bi bi-repeat"></i>
                    <i class="bi bi-send"></i>
                </div>
                <div class="right-actions">
                    <i class="bi bi-bookmark"></i>
                </div>
            </div>


            <!-- Post Details -->
            <div class="post-details">
                <p><strong>1,245 likes</strong></p>

                <p>
                    <strong>username</strong>
                    Beautiful sunset 🌅
                </p>

                <p class="comments">View all 32 comments</p>

                <p class="time">2 HOURS AGO</p>
            </div>


            <!-- </article> -->

        </section>

        <nav class="bottom-navbar">

            <i class="bi bi-house-fill"></i>

            <i class="bi bi-search"></i>

            <i class="bi bi-plus-square"></i>
            <i class="bi bi-collection-play"></i>
            <!-- <i class="bi bi-play-btn"></i> -->

            <i class="bi bi-person-circle"></i>

        </nav>

    </div>

</body>

</html>
