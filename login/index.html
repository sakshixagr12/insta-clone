<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style_login.css"/>
    <title>login page</title>
</head>
<body>
    <main>
        <div class="page">
            <div class="logotype">
              <img src="instagram_logotype.png" alt="Instagram">
            </div>
            <div class="credentials">
                <form>
                    <div id="username-field">
                        <input type="text" id="username"name="username" placeholder="Phone number,email or username" required>
                    </div>
                    <div id="passwd-field">
                        <input type="password" id="password"name="password" placeholder="Password" required>
                    </div>
                    <div class="submit-btn">
                        <button type="submit">Log In</button>
                    </div>
                </form>
            </div>
            <p id="forgot">Forgot your login details? <a href="#">Get help logging in.</a></p>
            <div class="Login-fb">
                <div class="divider">
                    <hr>
                    <span>OR</span>
                    <hr>
                </div>
                <p id="fb">Log in with Facebook</p>
            </div>
            <div class="signup-box">
                <p>
                    Don't have an account?
                    <a href="#">Sign up
                    </a>
                </p>
            </div>
        </div>
        

    </main>
    
</body>
</html>
